<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jericho's Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #4ec8f4 0%, #7dd9f7 38%, #a8edff 60%, #c6f0a0 75%, #78c850 100%);
      overflow-x: hidden;
      position: relative;
      padding-bottom: 220px;
    }

    /* ── Clouds ── */
    .doodle { position: absolute; pointer-events: none; user-select: none; }
    .cloud {
      background: white; border-radius: 50px; opacity: 0.88;
      animation: drift 8s ease-in-out infinite;
    }
    .cloud::before, .cloud::after { content:''; background:white; border-radius:50%; position:absolute; }
    .cloud-1 { width:90px;height:30px;top:8%;left:5%; }
    .cloud-1::before{width:40px;height:40px;top:-20px;left:12px;}
    .cloud-1::after{width:28px;height:28px;top:-12px;left:40px;}
    .cloud-2 { width:70px;height:24px;top:18%;right:8%;animation-delay:2s; }
    .cloud-2::before{width:32px;height:32px;top:-16px;left:10px;}
    .cloud-2::after{width:22px;height:22px;top:-10px;left:32px;}
    .cloud-3 { width:80px;height:26px;top:50%;left:2%;opacity:0.7;animation-delay:4s; }
    .cloud-3::before{width:36px;height:36px;top:-18px;left:10px;}
    .cloud-3::after{width:26px;height:26px;top:-12px;left:36px;}
    .cloud-4 { width:60px;height:20px;top:58%;right:4%;opacity:0.7;animation-delay:1s; }
    .cloud-4::before{width:28px;height:28px;top:-14px;left:8px;}
    .cloud-4::after{width:20px;height:20px;top:-8px;left:28px;}
    @keyframes drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }

    /* ── Ground scene ── */
    .ground-scene {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 220px;
      pointer-events: none;
      z-index: 5;
    }

    /* layered hills */
    .hill {
      position: absolute;
      border-radius: 50%;
      bottom: 0;
    }
    .hill-back  { width:140%; height:180px; background:#5ab832; left:-20%; bottom:-30px; }
    .hill-mid   { width:80%;  height:130px; background:#63cc38; left:-5%;  bottom:-10px; }
    .hill-mid2  { width:70%;  height:110px; background:#63cc38; right:-5%; bottom:-10px; }
    .hill-front { width:110%; height:80px;  background:#78d944; left:-5%;  bottom:0; }

    /* path */
    .path {
      position: absolute;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 90px;
      height: 70px;
      background: #c8a96e;
      border-radius: 50% 50% 0 0 / 60% 60% 0 0;
    }

    /* flowers */
    .flower {
      position: absolute;
      bottom: 58px;
      font-size: 22px;
      animation: flower-sway 3s ease-in-out infinite;
    }
    @keyframes flower-sway {
      0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)}
    }

    /* mushrooms */
    .shroom {
      position: absolute;
      bottom: 58px;
      font-size: 26px;
      animation: shroom-bob 4s ease-in-out infinite;
    }
    @keyframes shroom-bob {
      0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
    }

    /* grass tufts using SVG inline */
    .grass-tuft {
      position: absolute;
      bottom: 58px;
    }

    /* characters */
    .char {
      position: absolute;
      bottom: 52px;
      font-size: 52px;
      animation: char-bounce 3s ease-in-out infinite;
    }
    @keyframes char-bounce {
      0%,100%{transform:translateY(0) scaleX(1)} 50%{transform:translateY(-8px) scaleX(1)}
    }
    .char-flip { transform: scaleX(-1); display:inline-block; }

    /* speech bubbles on characters */
    .char-bubble {
      position: absolute;
      background: white;
      border: 2.5px solid #333;
      border-radius: 12px;
      padding: 4px 9px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 13px;
      color: #333;
      box-shadow: 2px 2px 0 #333;
      white-space: nowrap;
    }
    .char-bubble::after {
      content:'';
      position:absolute;
      bottom:-10px; left:12px;
      border:5px solid transparent;
      border-top-color:#333;
    }
    .char-bubble::before {
      content:'';
      position:absolute;
      bottom:-6px; left:14px;
      border:4px solid transparent;
      border-top-color:white;
      z-index:1;
    }

    /* butterfly */
    .butterfly {
      position: absolute;
      font-size: 24px;
      animation: flutter 4s ease-in-out infinite;
    }
    @keyframes flutter {
      0%{transform:translate(0,0) rotate(-10deg)}
      25%{transform:translate(10px,-15px) rotate(5deg)}
      50%{transform:translate(20px,0px) rotate(-10deg)}
      75%{transform:translate(10px,10px) rotate(5deg)}
      100%{transform:translate(0,0) rotate(-10deg)}
    }

    /* birds */
    .bird {
      position: absolute;
      font-size: 18px;
      animation: bird-fly 6s ease-in-out infinite;
    }
    @keyframes bird-fly {
      0%,100%{transform:translate(0,0)}
      50%{transform:translate(14px,-10px)}
    }

    /* ── Stars & sparkles ── */
    .star-svg { position:absolute; animation:twinkle 3s ease-in-out infinite; }
    @keyframes twinkle {
      0%,100%{transform:scale(1) rotate(0deg);opacity:1}
      50%{transform:scale(1.15) rotate(10deg);opacity:0.8}
    }
    .sparkle { position:absolute; font-size:20px; animation:sparkle-pop 2s ease-in-out infinite; }
    .sparkle-1{top:22%;left:14%;animation-delay:0s}
    .sparkle-2{top:30%;right:12%;animation-delay:0.7s}
    .sparkle-3{top:65%;left:8%;animation-delay:1.4s}
    @keyframes sparkle-pop {
      0%,100%{transform:scale(1);opacity:1}
      50%{transform:scale(1.3);opacity:0.6}
    }

    /* HEY bubble */
    .hey-bubble {
      position:absolute; top:6%; right:6%;
      background:white; border:3px solid #333; border-radius:16px;
      padding:8px 14px;
      font-family:'Nunito',sans-serif; font-weight:900; font-size:18px; color:#ff5c8a;
      box-shadow:3px 3px 0 #333;
    }
    .hey-bubble::after { content:''; position:absolute; bottom:-14px; left:14px; border:7px solid transparent; border-top-color:#333; }
    .hey-bubble::before { content:''; position:absolute; bottom:-10px; left:16px; border:5px solid transparent; border-top-color:white; z-index:1; }

    /* plane */
    .plane { position:absolute; top:28%; right:7%; animation:plane-fly 6s ease-in-out infinite; }
    @keyframes plane-fly {
      0%,100%{transform:translate(0,0) rotate(-10deg)}
      50%{transform:translate(-6px,-8px) rotate(-5deg)}
    }

    /* rocket */
    .rocket { position:absolute; top:52%; right:5%; font-size:40px; animation:rocket-bounce 3s ease-in-out infinite; }
    @keyframes rocket-bounce {
      0%,100%{transform:translateY(0) rotate(-20deg)}
      50%{transform:translateY(-10px) rotate(-20deg)}
    }

    /* ── Main content ── */
    .page {
      position:relative; z-index:10;
      display:flex; flex-direction:column; align-items:center;
      padding:50px 20px 40px;
      min-height:100vh;
    }

    .title {
      font-family:'Nunito',sans-serif; font-weight:900;
      font-size:clamp(36px,8vw,58px); letter-spacing:-1px; line-height:1;
      margin-bottom:10px; text-align:center;
      -webkit-text-stroke:2.5px #333; paint-order:stroke fill;
    }
    .title .yellow{color:#ffd62e}
    .title .white{color:#ffffff}

    .subtitle {
      font-family:'Nunito Sans',sans-serif; font-weight:600;
      font-size:clamp(14px,3.5vw,18px); color:#1a3a4a;
      margin-bottom:36px; text-align:center;
    }

    .links { width:100%; max-width:400px; display:flex; flex-direction:column; gap:18px; }

    .link-btn {
      display:flex; align-items:center; text-decoration:none;
      border-radius:50px; padding:10px 14px;
      border:3px solid #1a1a1a; box-shadow:4px 5px 0 #1a1a1a;
      transition:transform 0.15s, box-shadow 0.15s;
    }
    .link-btn:hover { transform:translate(-2px,-2px); box-shadow:6px 7px 0 #1a1a1a; }
    .link-btn:active { transform:translate(2px,2px); box-shadow:2px 2px 0 #1a1a1a; }

    .btn-icon {
      width:48px; height:48px; border-radius:14px;
      display:flex; align-items:center; justify-content:center;
      border:2.5px solid rgba(0,0,0,0.25);
      flex-shrink:0; margin-right:14px;
      background:rgba(255,255,255,0.2);
    }
    .btn-icon svg{width:26px;height:26px}

    .btn-text{flex:1}
    .btn-name {
      font-family:'Nunito',sans-serif; font-weight:900; font-size:20px;
      color:white; -webkit-text-stroke:0.5px rgba(0,0,0,0.3);
      display:block; line-height:1.1;
    }
    .btn-sub { font-family:'Nunito Sans',sans-serif; font-weight:600; font-size:12px; color:rgba(255,255,255,0.88); display:block; margin-top:2px; }

    .btn-arrow {
      width:36px; height:36px; border-radius:50%;
      background:rgba(0,0,0,0.2); border:2px solid rgba(255,255,255,0.5);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .btn-arrow svg{width:18px;height:18px}

    .btn-yt  { background:linear-gradient(135deg,#ff3b3b,#e60000); }
    .btn-li  { background:linear-gradient(135deg,#2177c2,#0a5fa8); }
    .btn-ig  { background:linear-gradient(135deg,#f9a825,#e91e8c,#9c27b0); }

    .connect-pill {
      margin-top:32px;
      background:white; border:2.5px solid #333; border-radius:50px;
      padding:10px 28px;
      font-family:'Nunito',sans-serif; font-weight:800; font-size:16px; color:#333;
      box-shadow:3px 3px 0 #333;
    }
    .hearts { margin-top:14px; font-size:20px; letter-spacing:6px; }
  </style>
</head>
