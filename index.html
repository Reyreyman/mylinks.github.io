<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jericho's Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #4ec8f4 0%, #7dd9f7 40%, #a8edff 65%, #c6f0a0 80%, #78c850 100%);
      overflow-x: hidden;
      position: relative;
    }

    /* ── Decorative doodles ── */
    .doodle {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    /* Clouds */
    .cloud {
      background: white;
      border-radius: 50px;
      opacity: 0.85;
      animation: drift 8s ease-in-out infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      background: white;
      border-radius: 50%;
      position: absolute;
    }
    .cloud-1 { width: 90px; height: 30px; top: 8%; left: 5%; }
    .cloud-1::before { width: 40px; height: 40px; top: -20px; left: 12px; }
    .cloud-1::after  { width: 28px; height: 28px; top: -12px; left: 40px; }

    .cloud-2 { width: 70px; height: 24px; top: 18%; right: 8%; animation-delay: 2s; }
    .cloud-2::before { width: 32px; height: 32px; top: -16px; left: 10px; }
    .cloud-2::after  { width: 22px; height: 22px; top: -10px; left: 32px; }

    .cloud-3 { width: 80px; height: 26px; top: 50%; left: 2%; opacity: 0.7; animation-delay: 4s; }
    .cloud-3::before { width: 36px; height: 36px; top: -18px; left: 10px; }
    .cloud-3::after  { width: 26px; height: 26px; top: -12px; left: 36px; }

    .cloud-4 { width: 60px; height: 20px; top: 58%; right: 4%; opacity: 0.7; animation-delay: 1s; }
    .cloud-4::before { width: 28px; height: 28px; top: -14px; left: 8px; }
    .cloud-4::after  { width: 20px; height: 20px; top: -8px; left: 28px; }

    @keyframes drift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(8px); }
    }

    /* Stars */
    .star { animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.15) rotate(10deg); opacity: 0.8; }
    }

    /* Sparkle dots */
    .sparkle { font-size: 20px; animation: sparkle-pop 2s ease-in-out infinite; }
    .sparkle-1 { top: 22%; left: 14%; animation-delay: 0s; }
    .sparkle-2 { top: 30%; right: 12%; animation-delay: 0.7s; }
    .sparkle-3 { top: 65%; left: 8%; animation-delay: 1.4s; }
    @keyframes sparkle-pop {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.6; }
    }

    /* "HEY!" speech bubble */
    .hey-bubble {
      position: absolute;
      top: 6%;
      right: 6%;
      background: white;
      border: 3px solid #333;
      border-radius: 16px;
      padding: 8px 14px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 18px;
      color: #ff5c8a;
      box-shadow: 3px 3px 0 #333;
    }
    .hey-bubble::after {
      content: '';
      position: absolute;
      bottom: -14px;
      left: 14px;
      border: 7px solid transparent;
      border-top-color: #333;
    }
    .hey-bubble::before {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 16px;
      border: 5px solid transparent;
      border-top-color: white;
      z-index: 1;
    }

    /* Paper plane */
    .plane {
      position: absolute;
      top: 28%;
      right: 7%;
      animation: plane-fly 6s ease-in-out infinite;
    }
    @keyframes plane-fly {
      0%, 100% { transform: translate(0, 0) rotate(-10deg); }
      50% { transform: translate(-6px, -8px) rotate(-5deg); }
    }

    /* Rocket */
    .rocket {
      position: absolute;
      top: 55%;
      right: 5%;
      font-size: 40px;
      animation: rocket-bounce 3s ease-in-out infinite;
    }
    @keyframes rocket-bounce {
      0%, 100% { transform: translateY(0) rotate(-20deg); }
      50% { transform: translateY(-10px) rotate(-20deg); }
    }

    /* Bottom characters */
    .dino { position: absolute; bottom: 0; left: 2%; font-size: 60px; }
    .dog  { position: absolute; bottom: 0; right: 3%; font-size: 55px; }

    /* "Yo!" and heart bubbles */
    .yo-bubble {
      position: absolute;
      bottom: 12%;
      left: 3%;
      background: white;
      border: 2.5px solid #333;
      border-radius: 12px;
      padding: 4px 10px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 14px;
      color: #333;
      box-shadow: 2px 2px 0 #333;
    }

    /* ── Main content ── */
    .page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 50px 20px 100px;
      min-height: 100vh;
    }

    /* Title */
    .title {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(36px, 8vw, 58px);
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 10px;
      text-align: center;
      -webkit-text-stroke: 2.5px #333;
      paint-order: stroke fill;
    }
    .title .yellow { color: #ffd62e; }
    .title .white  { color: #ffffff; }

    .subtitle {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: clamp(14px, 3.5vw, 18px);
      color: #1a3a4a;
      margin-bottom: 36px;
      text-align: center;
    }

    /* ── Link buttons ── */
    .links { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 18px; }

    .link-btn {
      display: flex;
      align-items: center;
      text-decoration: none;
      border-radius: 50px;
      padding: 10px 14px;
      border: 3px solid #1a1a1a;
      box-shadow: 4px 5px 0 #1a1a1a;
      transition: transform 0.15s, box-shadow 0.15s;
      position: relative;
    }
    .link-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 7px 0 #1a1a1a;
    }
    .link-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #1a1a1a;
    }

    .btn-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2.5px solid rgba(0,0,0,0.25);
      flex-shrink: 0;
      margin-right: 14px;
    }
    .btn-icon svg { width: 26px; height: 26px; }

    .btn-text { flex: 1; }
    .btn-name {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 20px;
      color: white;
      -webkit-text-stroke: 0.5px rgba(0,0,0,0.3);
      display: block;
      line-height: 1.1;
    }
    .btn-sub {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 12px;
      color: rgba(255,255,255,0.88);
      display: block;
      margin-top: 2px;
    }

    .btn-arrow {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(0,0,0,0.2);
      border: 2px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-arrow svg { width: 18px; height: 18px; }

    /* Per-platform colors */
    .btn-yt   { background: linear-gradient(135deg, #ff3b3b, #e60000); }
    .btn-yt .btn-icon { background: rgba(255,255,255,0.2); }

    .btn-li   { background: linear-gradient(135deg, #2177c2, #0a5fa8); }
    .btn-li .btn-icon { background: rgba(255,255,255,0.2); }

    .btn-ig   { background: linear-gradient(135deg, #f9a825, #e91e8c, #9c27b0); }
    .btn-ig .btn-icon { background: rgba(255,255,255,0.2); }

    /* "Let's connect!" pill */
    .connect-pill {
      margin-top: 32px;
      background: white;
      border: 2.5px solid #333;
      border-radius: 50px;
      padding: 10px 28px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 16px;
      color: #333;
      box-shadow: 3px 3px 0 #333;
    }

    /* Hearts row */
    .hearts { margin-top: 14px; font-size: 20px; letter-spacing: 6px; }

    /* Star doodle SVG helper */
    .star-svg {
      position: absolute;
      animation: twinkle 3s ease-in-out infinite;
    }
  </style>
</head>
<body>

  <!-- Clouds -->
  <div class="doodle cloud cloud-1"></div>
  <div class="doodle cloud cloud-2"></div>
  <div class="doodle cloud cloud-3"></div>
  <div class="doodle cloud cloud-4"></div>

  <!-- HEY! bubble -->
  <div class="hey-bubble">HEY!</div>

  <!-- Stars -->
  <svg class="doodle star-svg" style="top:15%;left:7%;animation-delay:0s;" width="38" height="38" viewBox="0 0 38 38">
    <polygon points="19,2 23,14 36,14 26,22 30,34 19,27 8,34 12,22 2,14 15,14" fill="#ffd62e" stroke="#e6a800" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="3" fill="#fff8" />
    <text x="11" y="21" font-size="9" font-family="sans-serif" fill="#e6a800">^v^</text>
  </svg>
  <svg class="doodle star-svg" style="top:12%;left:16%;animation-delay:1.5s;" width="22" height="22" viewBox="0 0 22 22">
    <polygon points="11,1 13,8 20,8 15,13 17,20 11,16 5,20 7,13 2,8 9,8" fill="#ffd62e" stroke="#e6a800" stroke-width="1"/>
  </svg>
  <svg class="doodle star-svg" style="top:38%;left:4%;animation-delay:0.8s;" width="18" height="18" viewBox="0 0 18 18">
    <polygon points="9,1 11,7 17,7 12,11 14,17 9,13 4,17 6,11 1,7 7,7" fill="#ffd62e" stroke="#e6a800" stroke-width="1"/>
  </svg>
  <svg class="doodle star-svg" style="top:62%;right:12%;animation-delay:0.4s;" width="22" height="22" viewBox="0 0 22 22">
    <polygon points="11,1 13,8 20,8 15,13 17,20 11,16 5,20 7,13 2,8 9,8" fill="#ffd62e" stroke="#e6a800" stroke-width="1"/>
  </svg>

  <!-- Sparkle crosses -->
  <span class="doodle sparkle sparkle-1">✦</span>
  <span class="doodle sparkle sparkle-2">✦</span>
  <span class="doodle sparkle sparkle-3">✦</span>

  <!-- Paper plane -->
  <svg class="plane" width="44" height="36" viewBox="0 0 44 36">
    <polygon points="2,18 42,4 30,32" fill="white" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
    <line x1="2" y1="18" x2="30" y2="20" stroke="#aaa" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="30" y1="20" x2="30" y2="32" stroke="#aaa" stroke-width="1.5"/>
  </svg>

  <!-- Rocket -->
  <div class="rocket">🚀</div>

  <!-- Lightning bolt -->
  <svg class="doodle" style="top:67%;right:2%;animation:twinkle 2s ease-in-out infinite;" width="28" height="44" viewBox="0 0 28 44">
    <polygon points="16,0 4,22 14,22 10,44 24,18 14,18" fill="#ffd62e" stroke="#e6a800" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>

  <!-- "Yo!" bubble -->
  <div class="yo-bubble">Yo!</div>

  <!-- Bottom characters -->
  <div class="dino">🦖</div>
  <div class="dog">🐕</div>

  <!-- Heart bubble (bottom right) -->
  <svg class="doodle" style="bottom:14%;right:14%;" width="50" height="44" viewBox="0 0 50 44">
    <rect x="1" y="1" width="48" height="34" rx="12" fill="white" stroke="#333" stroke-width="2.5"/>
    <text x="25" y="22" text-anchor="middle" font-size="16">💗</text>
    <polygon points="10,35 18,35 14,43" fill="white" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
    <line x1="10" y1="35" x2="18" y2="35" stroke="white" stroke-width="3"/>
  </svg>

  <!-- ── Page Content ── -->
  <div class="page">
    <h1 class="title">
      <span class="yellow">JERICHO'S</span>&nbsp;<span class="white">LINKS</span>
    </h1>
    <p class="subtitle">Connect with me on my other platforms! 💕</p>

    <div class="links">

      <!-- YouTube -->
      <a class="link-btn btn-yt" href="https://youtube.com" target="_blank" rel="noopener">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.3 2.8 12 2.8 12 2.8s-4.3 0-6.8.1c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.2.7 11.4v2.1C.7 15.7 1 17.9 1 17.9s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.7 22.1 12 22.1 12 22.1s4.3 0 6.8-.2c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.2.3-4.4v-2.1C23.3 9.2 23 7 23 7zm-13.5 8.9V8.1l8.1 3.9-8.1 3.9z"/></svg>
        </div>
        <div class="btn-text">
          <span class="btn-name">YouTube</span>
          <span class="btn-sub">Wala paakong youtube</span>
        </div>
        <div class="btn-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

      <!-- LinkedIn -->
      <a class="link-btn btn-li" href="https://www.linkedin.com/in/jericho-huang-052682383/" target="_blank" rel="noopener">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="white"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2" fill="white"/></svg>
        </div>
        <div class="btn-text">
          <span class="btn-name">LinkedIn</span>
          <span class="btn-sub">Let's connect professionally!</span>
        </div>
        <div class="btn-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

      <!-- Instagram -->
      <a class="link-btn btn-ig" href="https://www.instagram.com/mr.yellow36/" target="_blank" rel="noopener">
        <div class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
        </div>
        <div class="btn-text">
          <span class="btn-name">Instagram</span>
          <span class="btn-sub">See my life in pictures!</span>
        </div>
        <div class="btn-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

    </div>

    <div class="connect-pill">Let's connect!</div>
    <div class="hearts">💗 💗 💗</div>
  </div>

</body>
</html>
