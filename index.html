<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jericho's Links</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #2b2233;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(180deg, #45c0f5 0%, #6fd2f8 35%, #8fdffb 60%, #c9f2ff 78%);
      overflow-x: hidden;
      position: relative;
    }

    /* ════════ SKY LAYER ════════ */
    .sky-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .float-slow  { animation: floaty 7s ease-in-out infinite; }
    .float-mid   { animation: floaty 5s ease-in-out infinite; }
    .float-fast  { animation: floaty 4s ease-in-out infinite; }
    @keyframes floaty {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-12px); }
    }

    .spin-slow { animation: spin 30s linear infinite; transform-origin: center; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .twinkle { animation: twinkle 2.6s ease-in-out infinite; transform-origin: center; }
    @keyframes twinkle {
      0%,100% { transform: scale(1) rotate(0deg); opacity: 1; }
      50%     { transform: scale(1.2) rotate(12deg); opacity: .75; }
    }

    .flutter { animation: flutter 5s ease-in-out infinite; }
    @keyframes flutter {
      0%   { transform: translate(0,0) rotate(-8deg); }
      25%  { transform: translate(12px,-14px) rotate(6deg); }
      50%  { transform: translate(24px,-2px) rotate(-8deg); }
      75%  { transform: translate(12px,8px) rotate(6deg); }
      100% { transform: translate(0,0) rotate(-8deg); }
    }

    .sway { animation: sway 4s ease-in-out infinite; transform-origin: bottom center; transform-box: fill-box; }
    @keyframes sway {
      0%,100% { transform: rotate(-3deg); }
      50%     { transform: rotate(3deg); }
    }

    .bob { animation: bob 3s ease-in-out infinite; }
    @keyframes bob {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-7px); }
    }

    .sky-item { position: absolute; }

    /* ════════ GROUND SCENE ════════ */
    .ground {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      pointer-events: none;
      line-height: 0;
    }
    .ground svg { width: 100%; height: auto; display: block; min-height: 230px; }

    /* ════════ CONTENT ════════ */
    .page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 20px 300px;
      max-width: 480px;
      margin: 0 auto;
    }

    .title {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: clamp(38px, 9.5vw, 60px);
      line-height: 1;
      text-align: center;
      margin-bottom: 10px;
      -webkit-text-stroke: 2.5px var(--ink);
      paint-order: stroke fill;
      text-shadow: 0 4px 0 rgba(43,34,51,0.25);
    }
    .title .c1 { color: #ffd62e; }
    .title .c2 { color: #ffffff; }

    .subtitle {
      font-weight: 700;
      font-size: clamp(14px, 3.8vw, 17px);
      color: #14425a;
      background: rgba(255,255,255,0.55);
      border-radius: 30px;
      padding: 6px 18px;
      margin-bottom: 34px;
      text-align: center;
    }

    /* link cards */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      border-radius: 26px;
      padding: 13px 16px;
      border: 3.5px solid var(--ink);
      box-shadow: 0 6px 0 var(--ink);
      transition: transform .15s ease, box-shadow .15s ease;
    }
    .card:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 var(--ink); }
    .card:active { transform: translateY(3px);  box-shadow: 0 2px 0 var(--ink); }

    /* glossy highlight strip */
    .card::before {
      content: '';
      position: absolute;
      top: 6px; left: 18px; right: 18px;
      height: 12px;
      background: rgba(255,255,255,0.35);
      border-radius: 20px;
      pointer-events: none;
    }

    .card-icon {
      width: 52px; height: 52px;
      border-radius: 16px;
      background: #fff;
      border: 3px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: inset 0 -4px 0 rgba(0,0,0,0.08);
    }
    .card-icon svg { width: 28px; height: 28px; }

    .card-text { flex: 1; min-width: 0; }
    .card-name {
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 22px;
      color: #fff;
      display: block;
      line-height: 1.05;
      -webkit-text-stroke: 1px rgba(43,34,51,0.45);
      paint-order: stroke fill;
    }
    .card-sub {
      font-weight: 700;
      font-size: 12.5px;
      color: rgba(255,255,255,0.92);
      display: block;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-arrow {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      border: 3px solid var(--ink);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 3px 0 rgba(43,34,51,0.4);
      transition: transform .15s;
    }
    .card:hover .card-arrow { transform: translateX(3px); }
    .card-arrow svg { width: 18px; height: 18px; }

    .yt { background: linear-gradient(160deg, #ff6259 0%, #ee2b3a 70%); }
    .li { background: linear-gradient(160deg, #3d9be9 0%, #1268b3 70%); }
    .ig { background: linear-gradient(135deg, #ffb13d 0%, #f5447c 50%, #9b3bd6 100%); }

    /* badge sticker on card corner */
    .badge {
      position: absolute;
      top: -14px; left: -10px;
      transform: rotate(-12deg);
      pointer-events: none;
    }

    .pill {
      margin-top: 34px;
      background: #fff;
      border: 3px solid var(--ink);
      border-radius: 50px;
      padding: 10px 26px;
      font-family: 'Baloo 2', cursive;
      font-weight: 800;
      font-size: 17px;
      color: var(--ink);
      box-shadow: 0 4px 0 var(--ink);
      animation: floaty 5s ease-in-out infinite;
    }

    /* ════════ MOBILE TUNING ════════ */
    @media (max-width: 520px) {
      .page { padding: 34px 16px 240px; }
      .card { padding: 11px 13px; gap: 11px; }
      .card-icon { width: 46px; height: 46px; border-radius: 14px; }
      .card-icon svg { width: 24px; height: 24px; }
      .card-name { font-size: 19px; }
      .card-sub { font-size: 11.5px; }
      .card-arrow { width: 35px; height: 35px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
